
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三年级英语词汇泡泡消消乐</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* {
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
}
body {
  background: #fff5f7;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
}
.bubble {
  transition: all 0.25s ease;
  position: relative;
  min-height: 45px;
}
.bubble:active {
  transform: scale(0.92);
}
.bubble.selected {
  border: 3px solid #ffffff;
  box-shadow: 0 0 12px rgba(255,153,0,0.6);
}
.vanish {
  animation: vanish 0.6s ease forwards;
}
@keyframes vanish {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.6; }
  100% { transform: scale(0); opacity: 0; }
}
</style>
</head>
<body class="min-h-screen flex flex-col items-center py-5 px-4">
<div class="w-full max-w-[380px] flex justify-between items-center mb-4 text-lg font-bold">
  <div class="bg-orange-400 text-white px-4 py-2 rounded-full shadow">分数：<span id="score">0</span></div>
  <div class="bg-orange-400 text-white px-4 py-2 rounded-full shadow">时间：<span id="timer">00:00</span></div>
</div>

<div id="container" class="w-full max-w-[380px] grid grid-cols-2 gap-3 mb-6"></div>

<button id="restart" class="bg-orange-400 hover:bg-orange-500 text-white font-bold text-lg px-6 py-3 rounded-full shadow-lg hidden">
  继续游戏
</button>
<script src="phrase.js"></script>
