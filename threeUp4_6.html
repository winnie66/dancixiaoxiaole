
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三年级英语词汇泡泡消消乐</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* {
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
}
body {
  background: #fff5f7;
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
}
.bubble {
  transition: all 0.25s ease;
  position: relative;
  min-height: 80px;
}
.bubble:active {
  transform: scale(0.92);
}
.bubble.selected {
  border: 3px solid #ffffff;
  box-shadow: 0 0 12px rgba(255,153,0,0.6);
}
.vanish {
  animation: vanish 0.6s ease forwards;
}
@keyframes vanish {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.6; }
  100% { transform: scale(0); opacity: 0; }
}
</style>
</head>
<body class="min-h-screen flex flex-col items-center py-5 px-4">
<div class="w-full max-w-[380px] flex justify-between items-center mb-4 text-lg font-bold">
  <div class="bg-orange-400 text-white px-4 py-2 rounded-full shadow">分数：<span id="score">0</span></div>
  <div class="bg-orange-400 text-white px-4 py-2 rounded-full shadow">时间：<span id="timer">00:00</span></div>
</div>

<div id="container" class="w-full max-w-[380px] grid grid-cols-4 gap-3 mb-6"></div>

<button id="restart" class="bg-orange-400 hover:bg-orange-500 text-white font-bold text-lg px-6 py-3 rounded-full shadow-lg hidden">
  继续游戏
</button>
<script>
  
const wordList = [
//unit4
{en: "apple", cn: "苹果"},
{en: "banana", cn: "香蕉"},
{en: "farm", cn: "农场"},
{en: "air", cn: "空气"},
{en: "orange", cn: "橙子；柑橘"},
{en: "grape", cn: "葡萄"},
{en: "school", cn: "学校"},
{en: "garden", cn: "花园"},
{en: "need", cn: "需要"},
{en: "water", cn: "给…… 浇水；水"},
{en: "flower", cn: "花；花朵"},
{en: "grass", cn: "草；草地"},
{en: "plant", cn: "种植；植物"},
{en: "new", cn: "新的"},
  {en: "tree", cn: "树"},
  {en: "sun", cn: "阳光；太阳"},
  {en: "give", cn: "给"},
  {en: "us", cn: "我们"},
  {en: "them", cn: "它们；他们；她们"},
  //unit5
  {en: "colour", cn: "颜色"},
  {en: "orange", cn: "橙红色"},
  {en: "green", cn: "绿色的"},
  {en: "red", cn: "红色的"},
  {en: "blue", cn: "蓝色的"},
  {en: "make", cn: "使出现；做"},
  {en: "purple", cn: "紫色的"},
  {en: "brown", cn: "棕色的"},
  {en: "bear", cn: "熊"},
  {en: "yellow", cn: "黄色的"},
  {en: "duck", cn: "鸭"},
  {en: "sea", cn: "海；海洋"},
  {en: "pink", cn: "粉色的"},
  {en: "draw", cn: "画"},
  {en: "white", cn: "白色的"},
  {en: "black", cn: "黑色的"},
  //unit6
  {en: "old", cn: "年纪；旧的"},
  {en: "five", cn: "五"},
  {en: "year", cn: "年"},
  {en: "one", cn: "一"},
  {en: "two", cn: "二"},
  {en: "three", cn: "三"},
  {en: "four", cn: "四"},
  {en: "ten", cn: "十"},
  {en: "six", cn: "六"},
  {en: "seven", cn: "七"},
  {en: "eight", cn: "八"},
  {en: "nine", cn: "九"},
  {en: "o'clock", cn: "几点钟"},
  {en: "cut", cn: "切块"},
  {en: "eat", cn: "吃"},
  {en: "cake", cn: "蛋糕"}];

let usedWords = [];
let currentWords = [];
let score = 0;
let selected = null;
let locked = false;
let time = 0;
let timer;
let timerRunning = false;

function formatTime(s) {
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return m + ":" + sec;
}

function speak(text, lang) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = 0.9;
  speechSynthesis.speak(utter);
}

function getTenWords() {
  const pool = wordList.filter(w => !usedWords.includes(w.en));
  if (pool.length === 0) {
    alert("🎉 恭喜你！已完成全部单词练习！");
    return null;
  }
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const ten = shuffled.slice(0, 10);
  usedWords.push(...ten.map(w => w.en));
  return ten;
}

function render() {
  const container = document.getElementById("container");
  container.innerHTML = "";
  selected = null;
  locked = false;

  const ens = currentWords.map(w => ({ type: "en", text: w.en, match: w.cn }));
  const cns = currentWords.map(w => ({ type: "cn", text: w.cn, match: w.en }));
  const all = [...ens, ...cns].sort(() => Math.random() - 0.5);

  all.forEach(item => {
    const bubble = document.createElement("div");
    bubble.className = "bubble flex items-center justify-center rounded-full font-bold shadow-md aspect-square " +
      (item.type === "en" ? "bg-pink-300 text-lg" : "bg-green-300 text-base");
    bubble.textContent = item.text;

    bubble.addEventListener("click", () => {
      if (locked || bubble.classList.contains("vanish")) return;
      if (bubble === selected?.bubble) return;

      item.type === "en" ? speak(item.text, "en-US") : speak(item.text, "zh-CN");

      if (!selected) {
        selected = { bubble, matchText: item.match };
        bubble.classList.add("selected");
        return;
      }

      locked = true;
      if (selected.matchText === item.text && item.match === selected.bubble.textContent) {
        selected.bubble.classList.add("vanish");
        bubble.classList.add("vanish");
        score += 10;
        document.getElementById("score").textContent = score;
        setTimeout(() => {
          selected = null;
          locked = false;
          checkFinish();
        }, 600);
      } else {
        setTimeout(() => {
          selected.bubble.classList.remove("selected");
          selected = null;
          locked = false;
        }, 400);
      }
    });
    container.appendChild(bubble);
  });
}

function checkFinish() {
  if (document.querySelectorAll(".vanish").length === 20) {
    clearInterval(timer);
    document.getElementById("restart").classList.remove("hidden");
  }
}

function start() {
  currentWords = getTenWords();
  if (!currentWords) return;
  render();
  document.getElementById("restart").classList.add("hidden");
  if (!timerRunning) {
    timerRunning = true;
    timer = setInterval(() => {
      time++;
      document.getElementById("timer").textContent = formatTime(time);
    }, 1000);
  }
}

document.getElementById("restart").onclick = start;
window.onload = start;
</script>
</body>
</html>
